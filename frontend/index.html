<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Progressly" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Progressly – Own Progress Dashboard</title>
  </head>
  <body style="margin: 0; background-color: #0f1021;">
    <!-- Premium PWA Splash Screen -->
    <div id="pwa-splash" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #0f1021; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 99999; transition: opacity 0.5s ease, visibility 0.5s ease;">
      <div style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
        <img src="/logo.png" alt="Progressly Logo" style="width: 80px; height: 80px; border-radius: 20px; box-shadow: 0 0 25px rgba(124, 58, 237, 0.4);" />
        <h1 style="color: #ffffff; font-family: 'Inter', system-ui, sans-serif; font-size: 1.5rem; font-weight: 700; margin: 0; letter-spacing: 0.05em;">Progressly</h1>
        <div style="width: 40px; height: 40px; border: 3px solid rgba(124, 58, 237, 0.1); border-radius: 50%; border-top-color: #7c3aed; animation: spin-loader 1s linear infinite;"></div>
      </div>
    </div>
    <style>
      @keyframes spin-loader {
        to { transform: rotate(360deg); }
      }
    </style>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
