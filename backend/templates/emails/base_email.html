<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ subject }}</title>
  <style>
    body {
      background-color: #0b0c16;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }
    .wrapper {
      width: 100%;
      background-color: #0b0c16;
      padding: 40px 20px;
      box-sizing: border-box;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #111827;
      border: 1px solid rgba(139, 92, 246, 0.25);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    }
    .header {
      padding: 30px 40px 20px 40px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }
    .header img {
      margin-bottom: 12px;
      display: inline-block;
    }
    .header h1 {
      color: #ffffff;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.025em;
      margin: 0;
      text-transform: uppercase;
    }
    .body {
      padding: 40px;
    }
    .body h2 {
      color: #ffffff;
      font-size: 18px;
      font-weight: 700;
      margin-top: 0;
      margin-bottom: 16px;
    }
    .body p {
      color: #94a3b8;
      font-size: 15px;
      line-height: 1.6;
      margin-top: 0;
      margin-bottom: 24px;
    }
    .body blockquote {
      margin: 20px 0;
      padding: 16px 20px;
      background: rgba(139, 92, 246, 0.1);
      border-left: 3px solid #8b5cf6;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 14.5px;
      font-style: italic;
      line-height: 1.5;
    }
    .button-container {
      text-align: center;
      margin: 30px 0 10px 0;
    }
    .button {
      display: inline-block;
      padding: 12px 30px;
      background: linear-gradient(135deg, #8B5CF6 0%, #7C3AED 100%);
      color: #ffffff !important;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
    }
    .footer {
      padding: 20px 40px 30px 40px;
      text-align: center;
      border-top: 1px solid rgba(255, 255, 255, 0.03);
    }
    .footer p {
      color: #64748b;
      font-size: 12px;
      margin: 0 0 8px 0;
    }
    .footer p.automated {
      font-size: 11px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <div class="header">
        <img src="{{ logo_url }}" width="70" alt="Progressly Logo">
        <h1>Progressly</h1>
      </div>
      <div class="body">
        {% if title %}
          <h2>{{ title }}</h2>
        {% endif %}
        
        {{ message_html|safe }}
        
        {% if button_text and button_url %}
          <div class="button-container">
            <a href="{{ button_url }}" class="button">{{ button_text }}</a>
          </div>
        {% endif %}
      </div>
      <div class="footer">
        <p>&copy; {% now "Y" %} Progressly. All rights reserved.</p>
        <p class="automated">This is an automated email. Please do not reply directly to this message.</p>
      </div>
    </div>
  </div>
</body>
</html>
