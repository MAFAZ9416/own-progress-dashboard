{% extends "emails/base_email.html" %}

{% block content %}
<p style="margin: 0 0 16px 0; font-size: 17px; font-weight: 600; color: #ffffff;">Hi {{ user_name }},</p>
<p style="margin: 0 0 16px 0;">Your Progressly password was updated by an administrator.</p>
<p style="margin: 0 0 16px 0;">If you did not expect this or have any concerns, please contact your systems administrator immediately.</p>

<div style="text-align: center; margin: 28px 0;">
  <a href="{{ frontend_url }}/dashboard" style="display: inline-block; padding: 12px 28px; background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); border-radius: 10px; color: #ffffff !important; font-weight: 600; text-decoration: none; box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);">
    Go to Dashboard
  </a>
</div>
{% endblock %}
